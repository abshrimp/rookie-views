<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disc別 平均再生・マイリスト数</title>
    <style>
        body { font-family: sans-serif; margin: 20px; color: #333; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: right; }
        /* ヘッダーをホバーしたときに色を変えてクリックできることをアピール */
        th { background-color: #f4f4f4; text-align: center; cursor: pointer; user-select: none; }
        th:hover { background-color: #e0e0e0; }
        td:first-child { text-align: center; font-weight: bold; }
        .update-time { font-size: 0.9em; color: #666; margin-bottom: 20px; }
        /* 並び替えの矢印アイコンのスタイル */
        .sort-icon { font-size: 0.8em; margin-left: 5px; color: #888; }
    </style>
</head>
<body>

    <h1>Disc別 平均データ</h1>
    <div class="update-time" id="update-time">最終更新: 読み込み中...</div>

    <table>
        <thead>
            <tr>
                <th onclick="sortData('group')">グループ <span id="icon-group" class="sort-icon"></span></th>
                <th onclick="sortData('avg_view_counter')">平均再生数 <span id="icon-avg_view_counter" class="sort-icon"></span></th>
                <th onclick="sortData('avg_mylist_counter')">平均マイリスト数 <span id="icon-avg_mylist_counter" class="sort-icon"></span></th>
            </tr>
        </thead>
        <tbody id="stats-body">
            </tbody>
    </table>

    <script>
        // データを保持しておくための変数
        let currentData = [];
        let currentSortKey = 'group'; // 現在ソートしているキー
        let isAscending = true;       // 昇順かどうか

        async function loadStats() {
            try {
                const response = await fetch('stats.json?t=' + new Date().getTime());
                const data = await response.json();
                
                const date = new Date(data.lastUpdated);
                document.getElementById('update-time').textContent = 
                    `最終更新: ${date.toLocaleString('ja-JP')}`;

                // 取得したデータを変数に保存
                currentData = data.stats;
                
                // テーブルの描画とアイコンの更新
                renderTable();
                updateSortIcons();
            } catch (error) {
                console.error('データの取得に失敗しました:', error);
                document.getElementById('update-time').textContent = 'データの取得に失敗しました。しばらく待ってリロードしてください。';
            }
        }

        // 並び替え処理
        function sortData(key) {
            // 同じ列をクリックした場合は昇順・降順を切り替える
            if (currentSortKey === key) {
                isAscending = !isAscending;
            } else {
                // 違う列をクリックした場合はその列で昇順にする
                currentSortKey = key;
                isAscending = true;
            }

            // 配列を並び替え
            currentData.sort((a, b) => {
                if (a[key] < b[key]) return isAscending ? -1 : 1;
                if (a[key] > b[key]) return isAscending ? 1 : -1;
                return 0;
            });

            // 画面を更新
            renderTable();
            updateSortIcons();
        }

        // テーブルにデータを出力する処理
        function renderTable() {
            const tbody = document.getElementById('stats-body');
            tbody.innerHTML = ''; // 一度中身をリセット
            
            currentData.forEach(item => {
                const row = `<tr>
                    <td>Group ${item.group}</td>
                    <td>${item.avg_view_counter.toLocaleString()}</td>
                    <td>${item.avg_mylist_counter.toLocaleString()}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        // 矢印アイコン（▲/▼）の表示を更新する処理
        function updateSortIcons() {
            // すべてのアイコンを一度消す
            document.querySelectorAll('.sort-icon').forEach(icon => icon.textContent = '');
            
            // 現在ソート対象になっている列にだけアイコンをつける
            const activeIcon = document.getElementById(`icon-${currentSortKey}`);
            if (activeIcon) {
                activeIcon.textContent = isAscending ? '▲' : '▼';
            }
        }
        
        // 最初のデータ読み込み
        loadStats();
    </script>

</body>
</html>
